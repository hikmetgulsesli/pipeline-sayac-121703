<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sayı Sayacı</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error-container": "#93000a",
                      "background": "#f7f9fb",
                      "on-surface-variant": "#464554",
                      "surface": "#f7f9fb",
                      "secondary-container": "#fea619",
                      "on-secondary-fixed": "#2a1700",
                      "error-container": "#ffdad6",
                      "outline-variant": "#c7c4d7",
                      "on-surface": "#191c1e",
                      "inverse-on-surface": "#eff1f3",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "inverse-surface": "#2d3133",
                      "secondary-fixed-dim": "#ffb95f",
                      "tertiary-fixed-dim": "#ffb783",
                      "on-primary-fixed": "#07006c",
                      "on-tertiary-container": "#fffbff",
                      "primary-container": "#6063ee",
                      "inverse-primary": "#c0c1ff",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#f7f9fb",
                      "surface-container-highest": "#e0e3e5",
                      "surface-tint": "#494bd6",
                      "tertiary-fixed": "#ffdcc5",
                      "surface-container-low": "#f2f4f6",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#b55d00",
                      "surface-container-high": "#e6e8ea",
                      "on-secondary-fixed-variant": "#653e00",
                      "surface-dim": "#d8dadc",
                      "outline": "#767586",
                      "on-error": "#ffffff",
                      "on-secondary": "#ffffff",
                      "on-primary-container": "#fffbff",
                      "secondary-fixed": "#ffddb8",
                      "on-secondary-container": "#684000",
                      "secondary": "#855300",
                      "on-background": "#191c1e",
                      "error": "#ba1a1a",
                      "surface-variant": "#e0e3e5",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#e1e0ff",
                      "surface-container": "#eceef0",
                      "primary-fixed-dim": "#c0c1ff",
                      "on-tertiary-fixed": "#301400",
                      "primary": "#4648d4",
                      "on-tertiary-fixed-variant": "#703700",
                      "tertiary": "#904900"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "display": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              },
              "fontSize": {}
      },
          },
        }
      </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .display-font { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary selection:text-on-primary">
<!-- Top App Bar (Mobile View) -->
<header class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto md:hidden sticky top-0 z-40 bg-background/80 backdrop-blur-md">
<button class="text-[#6366f1] hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined text-2xl">drag_indicator</span>
</button>
<div class="text-2xl font-black text-[#6366f1] tracking-tight font-headline">Sayı Sayacı</div>
<button class="text-[#6366f1] hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined text-2xl">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-4 pb-32 pt-8 w-full max-w-md mx-auto space-y-8">
<!-- Quick Add Chips -->
<div class="flex space-x-4 w-full justify-center">
<button class="bg-surface-container-high text-on-surface font-label text-sm font-medium py-2 px-4 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 shadow-sm">
                +1
            </button>
<button class="bg-surface-container-high text-on-surface font-label text-sm font-medium py-2 px-4 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 shadow-sm">
                +5
            </button>
<button class="bg-surface-container-high text-on-surface font-label text-sm font-medium py-2 px-4 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 shadow-sm">
                +10
            </button>
</div>
<!-- The Hero Counter Card -->
<div class="w-full bg-surface-container-lowest rounded-3xl p-8 flex flex-col items-center justify-center relative overflow-hidden shadow-[0_20px_40px_-15px_rgba(70,72,212,0.05)] border border-outline-variant/15">
<!-- Asymmetric Label -->
<span class="absolute top-6 left-6 font-label text-sm font-medium text-on-surface-variant uppercase tracking-wider">Mevcut Sayı</span>
<div class="mt-8 mb-6 relative">
<span class="display-font text-8xl md:text-[8rem] font-bold text-on-surface leading-none tracking-tighter">
                    42
                </span>
</div>
</div>
<!-- Action Buttons Grid (Thumb Reach) -->
<div class="w-full grid grid-cols-2 gap-4">
<!-- Decrement (Azalt) -->
<button class="bg-surface-container-high text-on-surface-variant rounded-2xl py-6 flex flex-col items-center justify-center hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl mb-2">remove</span>
<span class="font-label text-sm font-semibold">Azalt</span>
</button>
<!-- Increment (Artır) - Primary Focus -->
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-2xl py-6 flex flex-col items-center justify-center shadow-[0_15px_30px_-10px_rgba(70,72,212,0.4)] hover:shadow-[0_20px_40px_-10px_rgba(70,72,212,0.5)] hover:scale-[1.02] transition-all active:scale-95">
<span class="material-symbols-outlined text-4xl mb-2 font-bold">add</span>
<span class="font-label text-base font-bold">Artır</span>
</button>
<!-- Reset (Sıfırla) - Spans Full Width -->
<button class="col-span-2 bg-transparent text-on-surface-variant rounded-2xl py-4 flex items-center justify-center hover:bg-surface-container-low transition-colors active:scale-95 mt-2 border border-outline-variant/20">
<span class="material-symbols-outlined mr-2">refresh</span>
<span class="font-label text-sm font-semibold">Sıfırla</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Mobile) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 backdrop-blur-xl rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(99,102,241,0.15)] md:hidden">
<!-- Tab 1: Sayaç (Active) -->
<a class="flex flex-col items-center justify-center bg-[#6366f1]/10 text-[#6366f1] rounded-2xl px-6 py-2 transition-all duration-300 scale-110" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="font-['Inter'] font-medium text-[10px]">Sayaç</span>
</a>
<!-- Tab 2: Geçmiş (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:bg-slate-50 rounded-2xl transition-all" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-['Inter'] font-medium text-[10px]">Geçmiş</span>
</a>
<!-- Tab 3: Ayarlar (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:bg-slate-50 rounded-2xl transition-all" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Inter'] font-medium text-[10px]">Ayarlar</span>
</a>
</nav>
</body></html>
