<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sayı Sayacı</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Nunito:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "background": "#f7f9fb",
                        "on-surface-variant": "#464554",
                        "surface": "#f7f9fb",
                        "secondary-container": "#fea619",
                        "on-secondary-fixed": "#2a1700",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c7c4d7",
                        "on-surface": "#191c1e",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-surface": "#2d3133",
                        "secondary-fixed-dim": "#ffb95f",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-primary-fixed": "#07006c",
                        "on-tertiary-container": "#fffbff",
                        "primary-container": "#6063ee",
                        "inverse-primary": "#c0c1ff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "surface-tint": "#494bd6",
                        "tertiary-fixed": "#ffdcc5",
                        "surface-container-low": "#f2f4f6",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#b55d00",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-fixed-variant": "#653e00",
                        "surface-dim": "#d8dadc",
                        "outline": "#767586",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "secondary-fixed": "#ffddb8",
                        "on-secondary-container": "#684000",
                        "secondary": "#855300",
                        "on-background": "#191c1e",
                        "error": "#ba1a1a",
                        "surface-variant": "#e0e3e5",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e1e0ff",
                        "surface-container": "#eceef0",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-tertiary-fixed": "#301400",
                        "primary": "#4648d4",
                        "on-tertiary-fixed-variant": "#703700",
                        "tertiary": "#904900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "display": ["Nunito", "sans-serif"],
                        "headline": ["Nunito", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb; /* Match background token */
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto docked full-width top-0 bg-[#f7f9fb] dark:bg-slate-900 transition-colors duration-200">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#6366f1] dark:text-[#818cf8] text-2xl font-black">drag_indicator</span>
<span class="font-['Nunito'] font-bold text-lg text-2xl font-black text-[#6366f1] dark:text-[#818cf8] tracking-tight">Sayı Sayacı</span>
</div>
<div class="flex items-center">
<button aria-label="Account" class="p-2 rounded-full hover:opacity-80 transition-opacity text-[#6366f1] dark:text-[#818cf8] scale-95 active:transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Background Element (Optional, for visual flair) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-fixed/30 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<!-- Central CounterCard -->
<div class="bg-surface-container-lowest rounded-xl p-10 md:p-16 max-w-md w-full relative group" style="box-shadow: 0 20px 40px -10px rgba(70, 72, 212, 0.05);">
<!-- Asymmetric Label -->
<div class="absolute top-6 left-6">
<span class="text-on-surface-variant font-label text-sm uppercase tracking-wider font-semibold">Mevcut Değer</span>
</div>
<!-- Counter Display -->
<div class="flex items-center justify-center mt-8 mb-12">
<span class="font-display font-bold text-on-surface" style="font-size: 8rem; line-height: 1; letter-spacing: -0.05em; color: #191c1e;">0</span>
</div>
<!-- ActionButtons Area -->
<div class="flex flex-col gap-4">
<!-- Primary Action (Artır) -->
<button class="w-full relative overflow-hidden rounded-lg group/btn transition-transform hover:scale-[1.02] active:scale-95 flex items-center justify-center py-4 px-6" style="background: linear-gradient(135deg, #4648d4 0%, #6063ee 100%); box-shadow: 0 10px 30px -5px rgba(70, 72, 212, 0.2);">
<div class="flex items-center gap-2 relative z-10 text-on-primary">
<span class="material-symbols-outlined font-bold">add</span>
<span class="font-label font-semibold text-lg">Artır</span>
</div>
</button>
<!-- Secondary Actions Row -->
<div class="flex gap-4">
<!-- Secondary Action (Azalt) -->
<button class="flex-1 rounded-lg bg-surface-container-high hover:bg-surface-dim transition-colors hover:scale-[1.02] active:scale-95 flex items-center justify-center py-3 px-4 group/btn2">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-secondary-container">remove</span>
<span class="font-label font-medium">Azalt</span>
</div>
</button>
<!-- Tertiary Action (Sıfırla) -->
<button class="flex-1 rounded-lg bg-transparent border border-outline-variant/30 hover:bg-surface-container-low transition-colors hover:scale-[1.02] active:scale-95 flex items-center justify-center py-3 px-4 group/btn3">
<div class="flex items-center gap-2 text-on-surface-variant group-hover/btn3:text-on-surface transition-colors">
<span class="material-symbols-outlined text-outline">rotate_left</span>
<span class="font-label font-medium">Sıfırla</span>
</div>
</button>
</div>
</div>
<!-- Quick Add Chips -->
<div class="mt-8 pt-6 border-t border-surface-container-highest flex justify-center gap-3">
<button class="px-4 py-2 bg-surface-container-high rounded-full font-label text-sm text-on-surface hover:bg-surface-dim transition-colors">+5</button>
<button class="px-4 py-2 bg-surface-container-high rounded-full font-label text-sm text-on-surface hover:bg-surface-dim transition-colors">+10</button>
<button class="px-4 py-2 bg-surface-container-high rounded-full font-label text-sm text-on-surface hover:bg-surface-dim transition-colors">+50</button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 md:hidden bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[2.5rem]" style="box-shadow: 0 -10px 40px -15px rgba(99,102,241,0.15);">
<!-- Active Tab: Sayaç -->
<button class="flex flex-col items-center justify-center bg-[#6366f1]/10 text-[#6366f1] dark:text-[#818cf8] rounded-2xl px-6 py-2 transition-all duration-300 scale-110 group relative">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="font-['Inter'] font-medium text-[10px]">Sayaç</span>
</button>
<!-- Inactive Tab: Geçmiş -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl transition-all duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">history</span>
<span class="font-['Inter'] font-medium text-[10px]">Geçmiş</span>
</button>
<!-- Inactive Tab: Ayarlar -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl transition-all duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">settings</span>
<span class="font-['Inter'] font-medium text-[10px]">Ayarlar</span>
</button>
</nav>
</body></html>
